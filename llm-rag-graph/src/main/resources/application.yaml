spring:
  application:
    name: llm-rag-graph
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: ${NEO4J_PASSWORD:password}

app:
  meta:
    name: LLM RAG Graph
    version: 0.0.1-SNAPSHOT
    description: Graph RAG pipeline — Neo4j relationships + Anthropic Claude
    author: Himansu Nayak
    java-version: "21"
    spring-boot-version: "4.1.0"
    neo4j-version: "5.x"
    llm-model: claude-opus-4-8
    github: https://github.com/himansu/llm-rag-graph
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-opus-4-8
    max-tokens: 4096
  graph:
    seed-data: true
    context-depth: 4
    max-context-nodes: 20
  security:
    auth-enabled: ${API_AUTH_ENABLED:false}   # dev default: open. Set true in prod.
    header: X-API-Key
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      roles: ACTUATOR
    info:
      enabled: true
  info:
    git:
      mode: full
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

logging:
  level:
    com.org.llm: DEBUG
    org.springframework.data.neo4j: INFO
