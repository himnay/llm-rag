server:
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: llm-rag-graph
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: ${NEO4J_PASSWORD:password}

app:
  meta:
    name: LLM RAG Graph
    version: 0.0.1-SNAPSHOT
    description: Graph RAG pipeline — Neo4j relationships + Anthropic Claude
    author: Himansu Nayak
    java-version: "21"
    spring-boot-version: "4.1.0"
    neo4j-version: "5.x"
    llm-model: claude-opus-4-8
    github: https://github.com/himansu/llm-rag-graph
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-opus-4-8
    max-tokens: 4096
  graph:
    seed-data: ${GRAPH_SEED_DATA:false}
    context-depth: 4
    max-context-nodes: 20
  security:
    auth-enabled: ${API_AUTH_ENABLED:true}   # secure by default; set API_AUTH_ENABLED=false for local dev
    header: X-API-Key
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      roles: ACTUATOR
    info:
      enabled: true
  info:
    git:
      mode: full
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,300ms,500ms,1s,2s,5s

resilience4j:
  circuitbreaker:
    instances:
      llm-rag-graph:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        register-health-indicator: true
  retry:
    instances:
      llm-rag-graph:
        max-attempts: 2
        wait-duration: 1s
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException

logging:
  level:
    com.org.llm: DEBUG
    org.springframework.data.neo4j: INFO
