name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Integration tests use Testcontainers (Postgres + Redis); Docker is available
      # on the ubuntu runner, and embeddings are stubbed so no OpenAI key is needed.
      - name: Build & test
        run: ./mvnw -B verify
