server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful   # drain in-flight requests on SIGTERM (rolling deploys)

spring:
  application:
    name: llm-rag-pipeline
  lifecycle:
    timeout-per-shutdown-phase: 30s   # bound graceful-shutdown drain time
  docker: # Containers are started via docker-compose; disable Boot's auto-management.
    compose:
      enabled: false
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      opensearch:
        aws:
          enabled: false             # AWS SDK is on the classpath (transitive); force plain HTTP transport, not SigV4
        uris: ${OPENSEARCH_URIS:http://localhost:9200}
        index-name: ${OPENSEARCH_INDEX:nexacorp_index}
        username: ${OPENSEARCH_USERNAME:}
        password: ${OPENSEARCH_PASSWORD:}
        dimensions: 1536                # must match the embedding model (text-embedding-3-small)
        initialize-schema: true         # create the knn index on startup if absent
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:llm-rag}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          # Shared Keycloak instance defined in llm-gateway's docker-compose; this service has its
          # own client (llm-rag-pipeline-client) in the same "llm-gateway" realm.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/llm-gateway}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/llm-rag}
      auto-index-creation: false   # indexes are created explicitly at startup (see ChunkDocumentRepository)
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  servlet:
    multipart: # allow reasonably large document uploads
      max-file-size: 25MB
      max-request-size: 25MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized   # expose internals only to ACTUATOR role, not unauthenticated callers
      show-components: when-authorized
      probes:
        enabled: true
      roles: ACTUATOR
    info:
      enabled: true
  info:
    git:
      mode: full
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        rag.retrieval: true
      slo:
        http.server.requests: 50ms,100ms,200ms,300ms,500ms,1s,2s,5s

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}/%X{spanId}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.org: INFO
    org.springframework.ai: INFO
    org.springframework.web: INFO

app:
  metadata:
    project-name: LLM RAG Pipeline
    description: Production-grade Spring AI RAG backend — document ingestion + vector retrieval.
    group-id: com.org
    artifact-id: llm-rag-pipeline
    project-version: 0.0.1-SNAPSHOT
    spring-ai-version: 2.0.0
    database: PostgreSQL 17
  ingestion:
    pdf-location: classpath:data/pdfs/
    wiki-location: classpath:data/wiki/
    pdf-reader: ${PDF_READER:page}          # page | paragraph
    inbox: # drop-folder watcher (hybrid with the REST API)
      enabled: ${INBOX_ENABLED:false}
      path: ${INBOX_PATH:/Users/himansu/REPOS/LLM/llm-rag/mail-folder/pdfs}
      poll-interval: 30s
      min-age: 5s
    ocr: # OCR for scanned/image PDF pages — opt-in (needs the native tesseract library)
      enabled: ${OCR_ENABLED:false}
      language: ${OCR_LANGUAGE:eng}
      data-path: ${OCR_DATAPATH:}
      min-chars-per-page: 40
      dpi: 300
  chunking:
    strategy: ${CHUNKING_STRATEGY:auto}      # auto | fixed | recursive | token | semantic | markdown | llm
    max-chars: 1000
    overlap: 150
    token:
      chunk-size: 800                        # tokens
    semantic:
      threshold: 0.8
      max-chars: 1500
    classifier: # LLM-based strategy selection under strategy=auto — opt-in due to LLM cost
      enabled: ${CHUNKING_CLASSIFIER_ENABLED:false}
      sample-chars: 2000                     # chars of document content sent to the LLM
  enrichment:
    enabled: ${ENRICHMENT_ENABLED:false}
    keywords: true
    summary: false
    keyword-count: 5
  retrieval:
    default-top-k: 10
    over-fetch-factor: 3            # fetch topK*factor candidates before post-filtering
    similarity-threshold: 0.0       # drop hits below this cosine score (0 = off); pushed down (vector mode)
    search:
      mode: ${SEARCH_MODE:vector}   # vector (cosine kNN) | keyword (BM25 full-text) | hybrid (RRF fusion)
    length:
      min-chars: 0                  # 0 = unbounded
      max-chars: 0
    dedup:
      enabled: true                 # collapse near-duplicate chunks at retrieval time
      threshold: 0.95
    mmr:
      enabled: false                # Maximal Marginal Relevance diversity
      lambda: 0.7
    rerank:
      enabled: ${RERANK_ENABLED:false}        # second-stage reranking (opt-in, fail-open)
      strategy: ${RERANK_STRATEGY:cross-encoder}  # cross-encoder | bi-encoder | llm-pointwise | llm-listwise | bm25 | rrf
      base-url: ${RERANK_BASE_URL:https://api.cohere.ai}   # cross-encoder only
      model: ${RERANK_MODEL:rerank-english-v3.0}           # cross-encoder only
      api-key: ${RERANK_API_KEY:}                          # cross-encoder only
      top-n: 0                                # re-score at most N candidates (cost cap); 0 = all
      timeout: 10s                            # cross-encoder HTTP read timeout
      min-score: 0.0                          # drop re-scored chunks below this relevance (0 = off)
      cache: # per-chunk score cache (costly strategies only)
        enabled: true
        max-size: 1000
        ttl: 10m
      breaker: # skip reranking while the vendor/model keeps failing
        failure-threshold: 3
        cooldown: 30s
    query-transform:
      mode: ${QUERY_TRANSFORM_MODE:NONE}   # NONE | REWRITE | MULTI_QUERY | HYDE | STEP_BACK
      multi-query-count: 3                 # number of variant queries for MULTI_QUERY mode
    classifier: # LLM decides search.mode + query-transform.mode together, per query — opt-in
      enabled: ${RETRIEVAL_CLASSIFIER_ENABLED:false}
  vectorstore:
    write:
      batch-size: 50
      concurrency: 4
      queue-capacity: 64           # bounded backlog for the shared write executor (back-pressure)
      embedding-model-id: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}  # stamped into every chunk's metadata
      embedding-dimension: 1536    # must match the model above; changing model requires full re-ingestion
      max-tokens-per-batch: 8191   # per-request token ceiling for the embedding vendor (OpenAI default)
      token-reserve-percentage: 0.1   # safety margin subtracted from the ceiling above
  security:
    auth-enabled: ${API_AUTH_ENABLED:false}   # dev default: open. Set true in prod.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}  # comma-separated; empty = no cross-origin browser access
    rate-limit:
      enabled: ${RATE_LIMIT_ENABLED:true}      # token bucket per API key (or client IP) on /api/**
      capacity: 120                            # burst size
      refill-per-minute: 120                   # sustained requests/min
    pii:
      enabled: ${PII_REDACTION_ENABLED:false}  # redact PII (email, phone, SSN, CC, IP) before embedding
      replacement: "[REDACTED]"
    safeguard: # Spring AI SafeGuardAdvisor — blocks requests containing a sensitive word, server-side
      enabled: ${SAFEGUARD_ENABLED:false}
      sensitive-words: []
      failure-response: "I'm unable to respond to that due to sensitive content. Could we rephrase or discuss something else?"
  generation:
    enabled: ${GENERATION_ENABLED:false}  # expose POST /api/v1/generate
    mode: ${GENERATION_MODE:manual}       # manual (Section 7 pattern) | advisor (Section 12 pattern)
    top-k: 5
    include-citations: true
    evaluate-faithfulness: ${EVALUATE_FAITHFULNESS:true}  # adds one extra LLM call per generation
    advisor:
      similarity-threshold: 0.7
    judge: # pre-generation LLM-as-judge — skips generation when retrieved context is insufficient
      enabled: ${GENERATION_JUDGE_ENABLED:true}
      insufficient-answer: "I don't have enough information in the available context to answer that question."
  cache:
    embedding:
      enabled: ${EMBEDDING_CACHE_ENABLED:true}   # cache text→vector to avoid re-embedding identical sentences
      max-size: 5000
      ttl: 24h
    semantic:
      enabled: ${SEMANTIC_CACHE_ENABLED:false}   # cache query→answer for FAQ-style traffic
      max-size: 500
      ttl: 30m
      similarity-threshold: 0.95
    chunk-dedup: # chunk-level content-hash dedup (Redis) — replaces identity-level Postgres dedup
      enabled: ${CHUNK_DEDUP_ENABLED:true}
      key-prefix: "chunkhash:"
      ttl: 720h                                   # 30 days; chunk re-ingested after this gets re-embedded once