services:
  postgres:
    image: postgres:18
    container_name: spring-ai
    environment:
      POSTGRES_DB: llm-rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql   # PG18+ stores data in a versioned subdir; mount the parent, not /data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d llm-rag" ]
      interval: 10s
      timeout: 5s
      retries: 5
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: llm-rag-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true          # dev only — no TLS/auth
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - "9200:9200"   # REST API ← app connects here
      - "9600:9600"   # performance analyzer
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
  opensearch-dashboards: # http://localhost:5601 — inspect the nexacorp_index
    image: opensearchproject/opensearch-dashboards:2.17.1
    container_name: llm-rag-opensearch-dashboards
    environment:
      - 'OPENSEARCH_HOSTS=["http://opensearch:9200"]'
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      - opensearch
    restart: unless-stopped
  mongo:
    image: mongo:7
    container_name: llm-rag-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
  mongo-express: # http://localhost:8082 — browse the chunks/lock collections
    image: mongo-express:1
    container_name: llm-rag-mongo-express
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017/
      - ME_CONFIG_BASICAUTH=false
    ports:
      - "8082:8081"
    depends_on:
      - mongo
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: llm-rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
  redisinsight: # http://localhost:5540 — add redis:6379 as a host (use "redis", not localhost) to browse ShedLock keys/cache entries
    image: redis/redisinsight:latest
    container_name: llm-rag-redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  opensearch_data:
  mongo_data:
  redis_data:
  redisinsight_data:
