openapi: 3.0.3
info:
  title: llm-rag-vectorless DTO contracts
  description: >
    Schema-only OpenAPI contract used solely to generate the REST-facing
    DTOs for com.rag.vectorless via openapi-generator-maven-plugin.
    Not a full API description (no paths defined).
  version: 1.0.0
paths: {}
components:
  schemas:
    ChatRequest:
      type: object
      description: Request body for /api/rag/chat and /api/rag/chat-pageindex.
      required:
        - question
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 4000
          description: >
            The user's question. Original record carried custom validation
            messages ("question must not be blank" / "question must not
            exceed 4000 characters") via @NotBlank/@Size — those message
            strings are NOT representable in OpenAPI bean-validation
            generation and are lost; generated code falls back to default
            Jakarta Bean Validation messages.

    Chunk:
      type: object
      description: A single indexed document chunk (BM25Retriever / DocumentLoader internals exposed via /api/rag/documents).
      properties:
        text:
          type: string
        source:
          type: string
        chunkIndex:
          type: integer
          format: int32

    Citation:
      type: object
      description: A single retrieval citation backing an answer.
      properties:
        source:
          type: string
          description: The source filename (matches Chunk.source).
        chunkIndex:
          type: integer
          format: int32
          description: The chunk position within the source document, when known.
        score:
          type: number
          format: double
          description: The BM25 relevance score for this chunk, when available.

    ChatResponse:
      type: object
      description: Response body for /api/rag/chat and /api/rag/chat-pageindex.
      properties:
        answer:
          type: string
        citations:
          type: array
          items:
            $ref: '#/components/schemas/Citation'
        faithful:
          type: boolean
